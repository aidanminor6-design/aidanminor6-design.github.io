<!DOCTYPE html>
<html lang="en">
        <head>
                <title>Canvas Functions</title>
        </head>
        <body>
                <h1>Functions</h1>
		<canvas id="canvas" width="800" height="800">
			<script>

			const canvas = document.getElementById("canvas");
			const ctx = canvas.getContext("2d");

			function fillColoredCircle(x, y, r, color){
				ctx.fillStyle = color;
				ctx.beginPath();
				ctx.arc(x, y, r, 0, 2*Math.PI);
				ctx.fill();
			}
				fillColoredCircle(100,100,50,"red");

			</script>
        </body>
	</html>
